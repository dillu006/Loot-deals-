<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Loot Le — Best Live Deals, First</title>
<meta name="description" content="Loot Le tracks the best live deals across Amazon, Flipkart, Myntra and more — pick a deal, tap once, buy at the source.">
<link rel="manifest" id="manifestLink">
<meta name="theme-color" content="#2874F0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="light"]{
    --bg:#F1F3F6; --bg-card:#FFFFFF; --line:#E7EAEF;
    --text:#212121; --text-dim:#6B7280;
    --accent:#2874F0; --accent-text:#FFFFFF;
    --cta-bg:#FB641B; --cta-text:#FFFFFF;
    --badge-bg:#26A541; --badge-u100:#FB641B;
    --price-now:#212121;
    --header-bg:#2874F0; --header-text:#FFFFFF;
    --ticker-bg:#FFF3E0; --ticker-line:#FFE0B2; --ticker-text:#8A5A00; --ticker-hot:#FF4D4F;
    --toast-bg:#212121; --toast-text:#FFFFFF;
    --chip-bg:#F1F3F6;
  }
  [data-theme="dark"]{
    --bg:#12151A; --bg-card:#1B1F26; --line:#2A2F38;
    --text:#EDEFF2; --text-dim:#9299A6;
    --accent:#E6B34C; --accent-text:#1A1200;
    --cta-bg:#E6B34C; --cta-text:#1A1200;
    --badge-bg:#E8555F; --badge-u100:#3BC48C;
    --price-now:#3BC48C;
    --header-bg:#12151A; --header-text:#EDEFF2;
    --ticker-bg:#1B1F26; --ticker-line:#2A2F38; --ticker-text:#9299A6; --ticker-hot:#E6B34C;
    --toast-bg:#1B1F26; --toast-text:#EDEFF2;
    --chip-bg:#1B1F26;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color:transparent;}
  body{padding-bottom:76px; transition:background .2s ease, color .2s ease;}
  a{color:inherit; text-decoration:none;}

  header.top{
    position:sticky; top:0; z-index:50; background:var(--header-bg); color:var(--header-text);
    padding:10px 14px 12px; transition:background .2s ease;
  }
  [data-theme="dark"] header.top{ border-bottom:1px solid var(--line); }
  .brand-row{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;}
  .brand{font-size:20px; font-weight:800; letter-spacing:-0.3px; color:var(--header-text);}
  .brand span{color:var(--accent); }
  [data-theme="light"] .brand span{ color:#FFE500; }
  .header-actions{display:flex; align-items:center; gap:8px;}
  .theme-toggle{
    font-size:15px; background:rgba(127,127,127,0.18); border:none; color:var(--header-text);
    width:32px; height:32px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .install-btn{
    font-size:11px; font-weight:700; color:var(--accent);
    background:#fff; border:none; padding:7px 12px; border-radius:4px; display:none;
  }
  [data-theme="dark"] .install-btn{ background:var(--accent); color:var(--accent-text); border-radius:7px; }
  .install-btn.show{display:inline-block;}
  .search-bar{
    background:var(--bg-card); border-radius:4px; padding:10px 12px; font-size:13.5px;
    color:var(--text-dim); display:flex; align-items:center; gap:8px;
  }
  .search-bar input::placeholder{ color:var(--text-dim); opacity:1; }

  .ticker-wrap{
    background:var(--ticker-bg); border-bottom:1px solid var(--ticker-line);
    overflow:hidden; white-space:nowrap; position:relative; padding:8px 0;
  }
  .ticker-wrap::before{
    content:'🔥 LIVE'; position:absolute; left:0; top:0; bottom:0;
    background:#E8555F; color:#fff; font-family:'JetBrains Mono', monospace;
    font-size:10px; font-weight:700; letter-spacing:1px;
    padding:0 10px; display:flex; align-items:center; z-index:2;
  }
  .ticker-track{
    display:inline-block; padding-left:90px;
    animation:scroll-ticker 28s linear infinite;
    font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--ticker-text);
  }
  .ticker-track span.hot{color:var(--ticker-hot); font-weight:700;}
  @keyframes scroll-ticker{0%{transform:translateX(0);} 100%{transform:translateX(-50%);}}

  .filters{ display:flex; gap:8px; overflow-x:auto; padding:14px 14px 4px; scrollbar-width:none; background:var(--bg-card); }
  .filters::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; font-size:13px; font-weight:600; color:var(--text);
    background:var(--chip-bg); border:1px solid var(--line);
    padding:7px 14px; border-radius:20px; cursor:pointer;
  }
  .chip.active{ background:var(--accent); color:var(--accent-text); border-color:var(--accent); }

  .section-label{ padding:16px 14px 4px; font-size:14.5px; font-weight:800; color:var(--text); }

  .featured-row{ display:flex; gap:10px; overflow-x:auto; padding:8px 14px 4px; scrollbar-width:none; }
  .featured-row::-webkit-scrollbar{display:none;}
  .f-card{ flex:0 0 auto; width:138px; background:var(--bg-card); border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; }
  .f-card .img-wrap{aspect-ratio:1/1; background:var(--bg); position:relative; overflow:hidden;}
  .f-card img{width:100%; height:100%; object-fit:cover;}
  .f-card .info{padding:8px 9px 10px;}
  .f-card .title{font-size:11.5px; font-weight:600; line-height:1.3; color:var(--text);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:4px;}
  .f-badge{ position:absolute; top:6px; left:6px; z-index:2; background:var(--badge-bg); color:#fff; font-size:10.5px; font-weight:800; padding:2px 6px; border-radius:4px; }
  .f-badge.u100{ background:var(--badge-u100); }
  .ends{ font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-dim); margin-top:3px; }
  .score-badge{ position:absolute; bottom:6px; right:6px; z-index:2; background:rgba(0,0,0,0.6); color:#FFE500; font-family:'JetBrains Mono', monospace; font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
  .link-flag{ font-size:9.5px; color:var(--ticker-hot); font-weight:600; }
  .empty-inline{ color:var(--text-dim); font-size:12.5px; padding:6px 0 4px; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px 14px; }
  @media(min-width:640px){ .grid{grid-template-columns:repeat(3,1fr);} }
  @media(min-width:960px){ .grid{grid-template-columns:repeat(4,1fr);} }

  .card{ background:var(--bg-card); border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; display:flex; flex-direction:column; }
  .card .img-wrap{ position:relative; aspect-ratio:1/1; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .card img{width:100%; height:100%; object-fit:cover;}
  .discount-badge{ position:absolute; top:7px; left:7px; background:var(--badge-bg); color:#fff; font-size:10.5px; font-weight:800; padding:3px 7px; border-radius:4px; }
  .store-badge{ position:absolute; top:7px; right:7px; background:rgba(0,0,0,0.55); color:#fff; font-size:9.5px; font-weight:700; padding:2px 7px; border-radius:4px; }
  .card .info{padding:9px 10px 11px; flex:1; display:flex; flex-direction:column; gap:5px;}
  .card .title{font-size:12.5px; font-weight:600; line-height:1.3; color:var(--text);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .price-row{display:flex; align-items:baseline; gap:6px;}
  .price-now{font-size:15px; font-weight:800; color:var(--price-now); font-family:'JetBrains Mono', monospace;}
  .price-was{font-size:11px; color:var(--text-dim); text-decoration:line-through;}

  .empty{ grid-column:1/-1; text-align:center; padding:50px 20px; color:var(--text-dim); }
  .empty .big{font-size:15px; font-weight:800; color:var(--text); margin-bottom:6px;}

  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:none; align-items:flex-end; justify-content:center; }
  .overlay.open{display:flex;}
  .sheet{ background:var(--bg-card); width:100%; max-width:480px; border-radius:16px 16px 0 0; padding:18px; max-height:88vh; overflow-y:auto; animation:slide-up .2s ease-out; }
  @keyframes slide-up{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
  .sheet .handle{width:36px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 14px;}
  .sheet img{width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; margin-bottom:14px; background:var(--bg);}
  .sheet h2{font-size:16px; font-weight:700; margin-bottom:8px; line-height:1.35; color:var(--text);}
  .sheet .price-row{font-size:19px; margin-bottom:4px;}
  .sheet .price-row .price-now{font-size:21px;}
  .sheet .price-row .price-was{font-size:13px;}
  .sheet .savings{font-size:12.5px; color:var(--badge-bg); font-weight:700; margin-bottom:16px;}
  .buy-btn{ display:block; width:100%; text-align:center; background:var(--cta-bg); color:var(--cta-text);
    font-weight:800; font-size:15px; padding:14px; border-radius:8px; border:none; cursor:pointer; }
  .buy-note{font-size:11px; color:var(--text-dim); text-align:center; margin-top:10px;}
  .close-x{position:absolute; top:14px; right:16px; color:var(--text-dim); font-size:20px; background:none; border:none;}

  .admin-footer{ display:none; }
  .app-credit{ text-align:center; font-size:10.5px; color:var(--text-dim); padding:18px 14px 10px; }
  .app-credit b{ color:var(--text); font-weight:700; }

  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:var(--bg-card); border-top:1px solid var(--line);
    display:flex; padding:6px 0 max(6px, env(safe-area-inset-bottom));
  }
  .bottom-nav a{ flex:1; text-align:center; font-size:10.5px; font-weight:600; color:var(--text-dim); padding:4px 0; }
  .bottom-nav a .ic{ display:block; font-size:19px; margin-bottom:2px; }
  .bottom-nav a.active{ color:var(--accent); }

  .toast{
    position:fixed; left:50%; bottom:84px; transform:translate(-50%, 12px);
    background:var(--toast-bg); color:var(--toast-text); font-size:12.5px; font-weight:600;
    padding:10px 16px; border-radius:20px; opacity:0; pointer-events:none;
    transition:all .25s ease; z-index:80; white-space:nowrap; border:1px solid var(--line);
  }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }
</style>
</head>
<body>

<div class="overlay" id="overlay">

<script>
// ---- inline PWA manifest (no external manifest.json needed) ----
(function(){
  const pageUrl = window.location.href.split('#')[0];
  const manifest = {
    name: "Loot Le — Best Live Deals",
    short_name: "LootLe",
    description: "Best live deals across Amazon, Flipkart, Myntra and more — updated every minute.",
    start_url: pageUrl,
    scope: pageUrl,
    id: pageUrl,
    display: "standalone",
    background_color: "#12151A",
    theme_color: "#2874F0",
    orientation: "portrait",
    icons: [{
      src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2312151A'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle'%3E%F0%9F%8E%AF%3C/text%3E%3C/svg%3E",
      sizes: "192x192", type: "image/svg+xml", purpose: "any maskable"
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('manifestLink').setAttribute('href', URL.createObjectURL(blob));
})();

// ---- inline service worker (no external sw.js needed) ----
(function(){
  if(!('serviceWorker' in navigator)) return;
  const swSource = `
    const CACHE='lootle-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.open(CACHE).then(async cache => {
          try {
            const fresh = await fetch(e.request);
            if(e.request.method==='GET' && fresh.ok) cache.put(e.request, fresh.clone());
            return fresh;
          } catch(err) {
            const cached = await cache.match(e.request);
            return cached || Response.error();
          }
        })
      );
    });
  `;
  const swBlob = new Blob([swSource], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  });
})();

// ---- theme toggle (persisted) ----
(function(){
  const root = document.documentElement;
  let saved = null;
  try { saved = localStorage.getItem('lootle_theme'); } catch(e){ /* storage blocked, ignore */ }
  if(saved) root.setAttribute('data-theme', saved);
  function syncIcon(){
    document.getElementById('themeToggle').textContent = root.getAttribute('data-theme')==='dark' ? '☀️' : '🌙';
  }
  function syncThemeColor(){
    const meta = document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute('content', root.getAttribute('data-theme')==='dark' ? '#12151A' : '#2874F0');
  }
  document.getElementById('themeToggle').onclick = ()=>{
    const next = root.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('lootle_theme', next); } catch(e){ /* storage blocked, ignore */ }
    syncIcon();
    syncThemeColor();
  };
  syncIcon();
  syncThemeColor();
})();

const STORAGE_KEY = 'lootle_deals_v4'; // v4: removed cashback/reward-code entries, kept only real buyable products
const REFRESH_MS = 60000; // "every min" auto update

// ============================================================
// BACKEND CONFIG — pulls deals.json from the same GitHub/Vercel deploy.
// Edit deals.json (or ask Claude to regenerate it) and push to GitHub —
// Vercel redeploys automatically and every visitor sees the update,
// no need to re-download/re-share index.html again.
//
// Expected response from GET `${BACKEND.dealsEndpoint}`:
// [{ title, store, category, price, mrp, image, link, expiresAt }, ...]
// - image: a real product image URL, or null/omitted to use the
//   built-in category icon (guaranteed to render, see catImg above)
// - link:  a real, direct product page URL (not the store homepage)
// - expiresAt: epoch ms when this deal should be dropped
// ============================================================
const BACKEND = {
  enabled: true,                // reading from the live-rotating serverless endpoint
  dealsEndpoint: '/api/deals'   // minute-by-minute rotation — see api/deals.js
};

async function fetchDealsFromBackend(){
  const res = await fetch(BACKEND.dealsEndpoint, {cache:'no-store'});
  if(!res.ok) throw new Error('backend fetch failed: ' + res.status);
  const data = await res.json();
  if(!Array.isArray(data)) throw new Error('backend response must be an array');
  return data.map(d => ({ ...d, id: d.id || uid(), image: d.image || catImg(d.category) }));
}

// Storage can throw (private mode, sandboxed iframes, some in-app webviews).
// Fall back to an in-memory store instead of letting that crash the whole app.
const AppStorage = (function(){
  let ok = true;
  try { localStorage.setItem('__lootle_test__','1'); localStorage.removeItem('__lootle_test__'); }
  catch(e){ ok = false; }
  const mem = {};
  return {
    get(key){
      if(ok){ try{ return localStorage.getItem(key); }catch(e){ ok = false; } }
      return Object.prototype.hasOwnProperty.call(mem,key) ? mem[key] : null;
    },
    set(key,val){
      if(ok){ try{ localStorage.setItem(key,val); return; }catch(e){ ok = false; } }
      mem[key] = val;
    }
  };
})();

// desidime.com's image CDN blocks hotlinking from other sites (403 on direct <img> load),
// so external product photos from there never actually render — confirmed by testing.
// Using self-contained inline SVG icons per category instead: zero network dependency,
// so these can NEVER fail to load, unlike a hotlinked photo that might work sometimes.
const CATEGORY_ICON = {
  'Electronics': ['🎧', '#DCEBFF'],
  'Home':        ['🏠', '#E7F6EC'],
  'Grocery':     ['🛒', '#FFF3E0'],
  'Grooming':    ['🧴', '#FCE4EC'],
  'Home Decor':  ['🖼️', '#F3E5F5'],
  'Books':       ['📖', '#FFF8E1'],
  'Craft':       ['✂️', '#E0F7FA'],
  'Kids':        ['🧸', '#FFEBEE'],
};
function catImg(category){
  const [emoji, bg] = CATEGORY_ICON[category] || ['🛍️', '#E7EAEF'];
  return 'data:image/svg+xml,' + encodeURIComponent(
    "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>" +
    `<rect width='200' height='200' fill='${bg}'/>` +
    `<text x='50%' y='54%' font-size='72' text-anchor='middle' dominant-baseline='middle'>${emoji}</text>` +
    "</svg>"
  );
}
const PLACEHOLDER_IMG = catImg(null);
function onImgErr(img){ img.onerror = null; img.src = PLACEHOLDER_IMG; }

// REAL loot deals — pulled live from DesiDime's hot-deals feed (desidime.com) on 12 Jul 2026.
// Only genuine single-click PRODUCT deals kept — cashback/reward-code/UPI-lite offers were
// excluded because those need multi-step redemption, not a simple "open product -> buy" flow.
// NOTE: only Amazon, Flipkart, Myntra and DigiHaat had verifiable single-product deals with
// real prices at fetch time — Meesho/Blinkit/Zepto/Snapdeal/Ajio/Jio are added as soon as a
// genuine product-level deal (not just a store-wide sale banner or payment coupon) turns up.
const CATALOG = [
  {title:'Bosch 9 kg 5 Star Front Load Fully-Automatic Washing Machine, AI ActiveWater, Black Grey', store:'Amazon', category:'Home',
    price:27140, mrp:59990, image:catImg('Home'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2134699'},
  {title:'Samsung 12 kg 5 Star AI Ecobubble Fully Automatic Front Load Washing Machine', store:'Flipkart', category:'Home',
    price:30740, mrp:52990, image:catImg('Home'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2133740'},
  {title:'OnePlus Nord Buds 4 TWS Earbuds, 52dB Real-time ANC', store:'Flipkart', category:'Electronics',
    price:3049, mrp:3499, image:catImg('Electronics'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2134662'},
  {title:'Gillette Men Fusion5 Premium Gift Set — Handle, 2 Blades, Travel Case', store:'Myntra', category:'Grooming',
    price:299, mrp:999, image:catImg('Grooming'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2134687'},
  {title:'OnePlus Buds 4 TWS, Up To 45 Hrs Playback, In-Ear Earbuds', store:'Myntra', category:'Electronics',
    price:4967, mrp:6499, image:catImg('Electronics'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2134623'},
  {title:'OnePlus Nord Buds 3 Truly Wireless Bluetooth Earbuds', store:'Myntra', category:'Electronics',
    price:1802, mrp:2799, image:catImg('Electronics'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2134629'},
  {title:'Zebronics Premium Gaming Cabinet, Mid-Tower, 4 ARGB Fans, Tempered Glass', store:'Amazon', category:'Electronics',
    price:2831, mrp:13499, image:catImg('Electronics'),
    link:'https://visit.desidime.com/visit/home-get-deals-1/2134497'},

function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function uid(){ return Math.random().toString(36).slice(2,9); }

function freshDealFrom(item){
  return {
    id: uid(),
    title: item.title, store: item.store, category: item.category,
    price: item.price, mrp: item.mrp, image: item.image, link: item.link,
    expiresAt: Date.now() + randInt(30,120) * 60000 // real deals: assume valid for 30min-2hr, refresh to re-check
  };
}

function seedIfEmpty(){
  if(AppStorage.get(STORAGE_KEY)) return;
  const shuffled = CATALOG.slice().sort(()=>Math.random()-0.5);
  const seed = shuffled.slice(0, 16).map(freshDealFrom);
  AppStorage.set(STORAGE_KEY, JSON.stringify(seed));
}

async function initDeals(){
  if(BACKEND.enabled){
    try{
      const deals = await fetchDealsFromBackend();
      saveDeals(deals);
      return;
    }catch(e){
      console.warn('Backend fetch failed, falling back to demo catalog:', e);
    }
  }
  seedIfEmpty();
}

function getDeals(){
  let deals;
  try{ deals = JSON.parse(AppStorage.get(STORAGE_KEY)) || []; }catch(e){ return []; }
  const now = Date.now();
  const live = deals.filter(d => d.expiresAt > now);
  if(live.length !== deals.length) saveDeals(live); // drop stale expired deals instead of showing "Ending…" until next refresh
  return live;
}
function saveDeals(deals){ AppStorage.set(STORAGE_KEY, JSON.stringify(deals)); }

function discountPct(price, mrp){
  if(!mrp || mrp<=price) return 0;
  return Math.round(((mrp-price)/mrp)*100);
}

// ============================================================
// LOOT SCORE ENGINE
// Replaces raw discount% ranking. Rewards genuine price shock,
// realistic demand, and real rupee savings — and caps anything
// that looks like an inflated MRP or points to a search page
// instead of the exact product (disclosed via a badge, not hidden).
// ============================================================
const CATEGORY_BAND = { // typical "notable saving" in rupees for this category — normalizes value-gap across price tiers
  'Electronics':3000, 'Home':15000, 'Grocery':40, 'Grooming':150,
  'Home Decor':60, 'Books':60, 'Craft':60, 'Kids':60, 'Fashion':800, 'Travel':4000,
};
const KNOWN_BRANDS = ['boat','oneplus','samsung','bosch','dettol','gillette','dove','hitachi','blue star','insta360','aristocrat','giordano','nilkamal','jcbl'];

function isSearchLink(link){
  if(!link) return true;
  return /[?&]q=|\/search\?|\/s\/\?/.test(link); // store search-results URL, not a direct product page
}
function isKnownBrand(title){
  const t = (title||'').toLowerCase();
  return KNOWN_BRANDS.some(b => t.includes(b));
}
function priceShock(mrp, price){
  if(!price || price<=0 || !mrp || mrp<=price) return 0;
  return Math.min(10, Math.log(mrp/price) * 3.1);
}
function demandWeight(d){
  let s = 3;
  if(isKnownBrand(d.title)) s += 4; // recognizable brand = real buyer demand, proxy for sales/review data we don't have yet
  if(['Electronics','Grocery','Grooming','Home'].includes(d.category)) s += 2; // frequently-bought categories
  return Math.min(10, s);
}
function valueGap(d){
  const band = CATEGORY_BAND[d.category] || 500;
  const saved = (d.mrp||0) - (d.price||0);
  return Math.min(10, (saved/band) * 10);
}
function trustScore(d){
  if(!d.mrp || d.mrp <= d.price) return 0;
  let s = 8;
  if((d.mrp/d.price) > 30) s -= 4; // suspiciously large multiplier — likely inflated "original price"
  if(isSearchLink(d.link)) s -= 3; // not an exact product page — must be disclosed
  return Math.max(0, s);
}
function computeLootScore(d){
  const shock = priceShock(d.mrp, d.price);
  const demand = demandWeight(d);
  const gap = valueGap(d);
  const trust = trustScore(d);
  let raw = (0.35*shock) + (0.30*demand) + (0.20*gap) + (0.15*trust);
  if(trust <= 2) raw = Math.min(raw, 3); // hard cap: unverified MRP or indirect link can't rank as top loot
  return Math.round(raw*10)/10;
}
function formatPrice(n){
  if(n==null || isNaN(n)) return '0';
  return Math.round(n).toLocaleString('en-IN');
}
function timeLeftLabel(expiresAt){
  const ms = expiresAt - Date.now();
  if(ms<=0) return 'Ending…';
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

let activeCategory = 'All';
let searchTerm = '';

function renderTicker(deals){
  const track = document.getElementById('tickerTrack');
  if(!track) return;
  const hot = deals.slice().sort((a,b)=>computeLootScore(b)-computeLootScore(a)).slice(0,8);
  if(hot.length===0){ track.textContent = 'No deals yet — check back soon.'; return; }
  const items = hot.map(d=>`${d.title} <span class="hot">${discountPct(d.price,d.mrp)}% OFF</span> on ${d.store}`);
  const line = items.join('   •   ');
  track.innerHTML = line + '   •   ' + line;
}

function renderFeatured(deals){
  const wrap = document.getElementById('featuredRow');
  if(!wrap) return;
  const top = deals.slice().sort((a,b)=>computeLootScore(b)-computeLootScore(a)).slice(0,8);
  wrap.innerHTML = '';
  top.forEach(d=>{
    const pct = discountPct(d.price, d.mrp);
    const score = computeLootScore(d);
    const card = document.createElement('div');
    card.className = 'f-card';
    card.innerHTML = `
      <div class="img-wrap">
        ${pct>0 ? `<div class="f-badge">${pct}% OFF</div>` : ''}
        <div class="score-badge">🎯 ${score}</div>
        <img src="${d.image}" alt="${d.title}" loading="lazy" onerror="onImgErr(this)">
      </div>
      <div class="info">
        <div class="title">${d.title}</div>
        <div class="price-row"><span class="price-now">₹${formatPrice(d.price)}</span>${d.mrp && pct>0 ? `<span class="price-was">₹${formatPrice(d.mrp)}</span>` : ''}</div>
        ${isSearchLink(d.link) ? `<div class="link-flag">Search link, not exact page</div>` : ''}
        <div class="ends" data-expires="${d.expiresAt}">Ends in ${timeLeftLabel(d.expiresAt)}</div>
      </div>`;
    card.onclick = ()=>openSheet(d);
    wrap.appendChild(card);
  });
}

function renderUnder100(deals){
  const wrap = document.getElementById('under100Row');
  if(!wrap) return;
  const cheap = deals.filter(d=>d.price < 100).sort((a,b)=>a.price-b.price).slice(0,8);
  wrap.innerHTML = '';
  if(cheap.length===0){
    wrap.innerHTML = `<div class="empty-inline">No deals under ₹100 right now — check back in a minute.</div>`;
    return;
  }
  cheap.forEach(d=>{
    const pct = discountPct(d.price, d.mrp);
    const card = document.createElement('div');
    card.className = 'f-card';
    card.innerHTML = `
      <div class="img-wrap">
        <div class="f-badge u100">₹${formatPrice(d.price)}</div>
        <img src="${d.image}" alt="${d.title}" loading="lazy" onerror="onImgErr(this)">
      </div>
      <div class="info">
        <div class="title">${d.title}</div>
        <div class="price-row"><span class="price-now">₹${formatPrice(d.price)}</span>${pct>0?`<span class="price-was">₹${formatPrice(d.mrp)}</span>`:''}</div>
      </div>`;
    card.onclick = ()=>openSheet(d);
    wrap.appendChild(card);
  });
}

function renderFilters(deals){
  const cats = ['All', ...new Set(deals.map(d=>d.category).filter(Boolean))];
  const wrap = document.getElementById('filters');
  if(!wrap) return;
  wrap.innerHTML = '';
  cats.forEach(cat=>{
    const el = document.createElement('div');
    el.className = 'chip' + (cat===activeCategory ? ' active' : '');
    el.textContent = cat;
    el.onclick = ()=>{ activeCategory = cat; renderAll(); };
    wrap.appendChild(el);
  });
}

function renderGrid(deals){
  const grid = document.getElementById('grid');
  if(!grid) return;
  grid.innerHTML = '';
  let filtered = activeCategory==='All' ? deals.slice() : deals.filter(d=>d.category===activeCategory);
  if(searchTerm){
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(d =>
      d.title.toLowerCase().includes(q) ||
      d.store.toLowerCase().includes(q) ||
      (d.category||'').toLowerCase().includes(q)
    );
  }
  // cheap rates first, as requested
  filtered.sort((a,b)=>a.price-b.price);
  if(filtered.length===0){
    grid.innerHTML = `<div class="empty"><div class="big">No deals here yet</div>${searchTerm ? 'Try a different search term.' : 'New deals drop every minute — try another category.'}</div>`;
    return;
  }
  filtered.forEach(d=>{
    const pct = discountPct(d.price, d.mrp);
    const score = computeLootScore(d);
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="img-wrap">
        <img src="${d.image}" alt="${d.title}" loading="lazy" onerror="onImgErr(this)">
        ${pct>0 ? `<div class="discount-badge">${pct}% OFF</div>` : ''}
        <div class="store-badge">${d.store}</div>
        <div class="score-badge">🎯 ${score}</div>
      </div>
      <div class="info">
        <div class="title">${d.title}</div>
        <div class="price-row">
          <span class="price-now">₹${formatPrice(d.price)}</span>
          ${d.mrp ? `<span class="price-was">₹${formatPrice(d.mrp)}</span>` : ''}
        </div>
        ${isSearchLink(d.link) ? `<div class="link-flag">Search link, not exact page</div>` : ''}
        <div class="ends" data-expires="${d.expiresAt}">Ends in ${timeLeftLabel(d.expiresAt)}</div>
      </div>`;
    card.onclick = ()=>openSheet(d);
    grid.appendChild(card);
  });
}

function openSheet(d){
  const pct = discountPct(d.price, d.mrp);
  const sheetImg = document.getElementById('sheetImg');
  sheetImg.onerror = ()=>onImgErr(sheetImg);
  sheetImg.src = d.image;
  document.getElementById('sheetTitle').textContent = d.title;
  document.getElementById('sheetNow').textContent = '₹' + formatPrice(d.price);
  document.getElementById('sheetWas').textContent = d.mrp ? '₹' + formatPrice(d.mrp) : '';
  document.getElementById('sheetSavings').textContent = pct>0 ? `You save ${pct}% (₹${formatPrice(d.mrp - d.price)}) · Loot Score ${computeLootScore(d)}/10` : '';
  document.getElementById('sheetBuy').href = d.link || '#';
  document.getElementById('sheetBuy').textContent = isSearchLink(d.link) ? 'Search on store →' : 'Buy Now →';
  const existingNote = document.querySelector('.buy-note');
  if(existingNote){
    existingNote.textContent = isSearchLink(d.link)
      ? "This deal's exact product page wasn't verified — you'll land on a store search for it."
      : "You'll be redirected to the store to complete your purchase.";
  }
  document.getElementById('overlay').classList.add('open');
}
document.getElementById('closeSheet').onclick = ()=>document.getElementById('overlay').classList.remove('open');
document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') e.currentTarget.classList.remove('open'); };

function renderAll(){
  const deals = getDeals();
  renderTicker(deals);
  renderFeatured(deals);
  renderUnder100(deals);
  renderFilters(deals);
  renderGrid(deals);
}
initDeals().then(renderAll);
document.getElementById('searchInput').addEventListener('input', (e)=>{
  searchTerm = e.target.value.trim();
  renderGrid(getDeals());
});
setInterval(()=>{
  document.querySelectorAll('[data-expires]').forEach(el=>{
    el.textContent = 'Ends in ' + timeLeftLabel(Number(el.dataset.expires));
  });
}, 1000);

function showToast(msg){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=>t.classList.remove('show'), 2600);
}

// every-minute refresh: drop expired deals, bring in new ones automatically
async function refreshDeals(){
  if(BACKEND.enabled){
    try{
      const deals = await fetchDealsFromBackend();
      saveDeals(deals);
      renderAll();
      return;
    }catch(e){
      console.warn('Backend refresh failed, keeping last known deals:', e);
      return; // don't fall back to fake demo data once we're expecting a real backend
    }
  }

  // ---- demo-only fallback below (no backend configured) ----
  let deals = getDeals();
  const before = deals.length;
  deals = deals.filter(d => d.expiresAt > Date.now());
  const removed = before - deals.length;

  const existingTitles = new Set(deals.map(d=>d.title));
  const pool = CATALOG.filter(c=>!existingTitles.has(c.title));
  const addCount = Math.max(removed, randInt(1,2));
  const shuffledPool = pool.sort(()=>Math.random()-0.5).slice(0, addCount);
  const added = shuffledPool.map(freshDealFrom);
  deals = deals.concat(added);

  saveDeals(deals);
  renderAll();
  if(added.length){
    showToast(`🔥 ${added.length} new deal${added.length>1?'s':''} just dropped`);
  }
}
setInterval(refreshDeals, REFRESH_MS);

// refresh grid if another tab updates storage
window.addEventListener('storage', (e)=>{ if(e.key===STORAGE_KEY) renderAll(); });

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});
document.getElementById('installBtn').onclick = async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').classList.remove('show');
};
